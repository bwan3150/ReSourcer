name: Server Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'server-v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            artifact_name: re-sourcer-linux-x86_64
          # TODO: re-enable when aarch64 iteration stabilizes
          # - target: aarch64-unknown-linux-gnu
          #   runner: ubuntu-24.04-arm
          #   artifact_name: re-sourcer-linux-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Build release binary
        working-directory: server
        run: cargo build --release

      - name: Prepare artifact
        run: |
          mv server/target/release/re-sourcer ${{ matrix.artifact_name }}
          chmod +x ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect commits since last tag
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^server-v[0-9]+\.[0-9]+\.[0-9]+' | sed -n '2p' || true)
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s")
          fi
          echo "$COMMITS" > /tmp/commits.txt

      - name: Generate release notes with AI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          COMMITS=$(cat /tmp/commits.txt)

          PROMPT="Below is a list of git commits for this release of ReSourcer (a resource management server):

          ${COMMITS}

          Categorize and rewrite these commits into a clear changelog. Important rules:
          - A single commit may contain MULTIPLE changes — split them into separate items
          - Each item should be a concise, user-friendly description
          - Write in English
          - Capitalize the first letter of each description

          Output ONLY valid JSON in this exact format, with no markdown code fences or extra text:
          {\"features\": [\"desc1\"], \"updates\": [\"desc1\"], \"fixes\": [\"desc1\"]}

          Categories: features (new capabilities), updates (improvements/refactors), fixes (bug fixes)
          If a category has no items, use an empty array []."

          RESPONSE=$(curl -sf https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$(jq -n --arg prompt "$PROMPT" '{
              "model": "gpt-4.1-mini",
              "messages": [{"role": "user", "content": $prompt}],
              "max_tokens": 1024,
              "temperature": 0.3
            }')")

          CHANGELOG=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          echo "$CHANGELOG" > /tmp/changelog.json

          BODY=""
          FEATURES=$(echo "$CHANGELOG" | jq -r '.features // [] | if length > 0 then "### Features\n" + (map("- " + .) | join("\n")) else empty end')
          UPDATES=$(echo "$CHANGELOG" | jq -r '.updates // [] | if length > 0 then "### Updates\n" + (map("- " + .) | join("\n")) else empty end')
          FIXES=$(echo "$CHANGELOG" | jq -r '.fixes // [] | if length > 0 then "### Fixes\n" + (map("- " + .) | join("\n")) else empty end')

          BODY="${FEATURES}"
          [ -n "$UPDATES" ] && BODY="${BODY}\n\n${UPDATES}"
          [ -n "$FIXES" ] && BODY="${BODY}\n\n${FIXES}"

          if [ -z "$BODY" ]; then
            BODY="### Changes\n$(cat /tmp/commits.txt)"
          fi

          echo -e "$BODY" > /tmp/release_body.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          body_path: /tmp/release_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

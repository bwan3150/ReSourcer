name: Build Release

on:
  workflow_dispatch:
    inputs:
      build_server:
        description: 'Build Server'
        type: boolean
        default: true
      build_ios:
        description: 'Build iOS IPA'
        type: boolean
        default: false
      upload_pgyer:
        description: 'Upload iOS to Pgyer'
        type: boolean
        default: false
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Server binary build
  build-server:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.runner }}
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_server == 'true')

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            artifact_name: re-sourcer-linux-x86_64
          # TODO: re-enable when aarch64 iteration stabilizes
          # - target: aarch64-unknown-linux-gnu
          #   runner: ubuntu-24.04-arm
          #   artifact_name: re-sourcer-linux-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Build release binary
        working-directory: server
        run: cargo build --release

      - name: Prepare artifact
        run: |
          mv server/target/release/re-sourcer ${{ matrix.artifact_name }}
          chmod +x ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 7

  # iOS app build (Ad-Hoc for testing)
  build-ios:
    name: Build iOS IPA
    runs-on: macos-26
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_ios == 'true')
    environment: iOS-CICD-IPA-Release-Testing-Build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # Import signing certificate and provisioning profile
      - name: Import signing credentials
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          PROVISION_PATH=$RUNNER_TEMP/provision.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$IOS_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode -o $PROVISION_PATH

          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(security cms -D -i $PROVISION_PATH))
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROVISION_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "Provisioning Profile UUID: $PP_UUID"

      - name: Configure manual signing
        run: |
          PROJECT_FILE="iOS/ReSourcer.xcodeproj/project.pbxproj"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT_FILE"
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = "";/PROVISIONING_PROFILE_SPECIFIER = "'"$PP_UUID"'";/g' "$PROJECT_FILE"

      - name: Create ExportOptions.plist
        run: |
          cat > iOS/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>release-testing</string>
              <key>teamID</key>
              <string>925YHK2R4K</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.resourcer.apple</key>
                  <string>${PP_UUID}</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Build archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project iOS/ReSourcer.xcodeproj \
            -scheme ReSourcer \
            -configuration Release \
            -archivePath $RUNNER_TEMP/ReSourcer.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="925YHK2R4K" \
            PROVISIONING_PROFILE_SPECIFIER="$PP_UUID" \
            2>&1 | tee /tmp/archive.log | tail -30

          # Verify archive was created
          if [ ! -d "$RUNNER_TEMP/ReSourcer.xcarchive" ]; then
            echo "Archive failed. Full log:"
            cat /tmp/archive.log
            exit 1
          fi

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/ReSourcer.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist iOS/ExportOptions.plist \
            2>&1 | tee /tmp/export.log | tail -20

          if [ ! -d "$RUNNER_TEMP/export" ]; then
            echo "Export failed. Full log:"
            cat /tmp/export.log
            exit 1
          fi

      - name: Prepare IPA artifact
        run: |
          IPA_PATH=$(find $RUNNER_TEMP/export -name "*.ipa" -type f | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "IPA not found"
            ls -R $RUNNER_TEMP/export/
            exit 1
          fi
          cp "$IPA_PATH" ReSourcer.ipa
          echo "IPA size: $(du -h ReSourcer.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ReSourcer.ipa
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  # Upload iOS IPA to Pgyer
  upload-pgyer:
    name: Upload to Pgyer
    needs: build-ios
    runs-on: ubuntu-latest
    if: |
      needs.build-ios.result == 'success' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_pgyer == 'true'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate update description
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Collect recent commits (since last tag or last 20)
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD 2>/dev/null | head -20)
          fi
          if [ -z "$COMMITS" ]; then
            COMMITS=$(git log --pretty=format:"- %s" -20)
          fi

          # Try AI summary, fallback to raw commits
          DESCRIPTION=""
          if [ -n "$OPENAI_API_KEY" ]; then
            PROMPT="Summarize these git commits into a brief Chinese changelog (3-5 bullet points, focus on user-facing changes):

            ${COMMITS}

            Output plain text, no markdown, no headers. Each line starts with •"

            RESPONSE=$(curl -sf https://api.openai.com/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              -d "$(jq -n --arg prompt "$PROMPT" '{
                "model": "gpt-4.1-mini",
                "messages": [{"role": "user", "content": $prompt}],
                "max_tokens": 512,
                "temperature": 0.3
              }')" 2>/dev/null || true)

            if [ -n "$RESPONSE" ]; then
              DESCRIPTION=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)
            fi
          fi

          if [ -z "$DESCRIPTION" ]; then
            DESCRIPTION="$COMMITS"
          fi

          echo "$DESCRIPTION" > /tmp/pgyer_desc.txt
          echo "--- Pgyer description ---"
          cat /tmp/pgyer_desc.txt

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: artifacts

      - name: Upload to Pgyer
        run: |
          DESCRIPTION=$(cat /tmp/pgyer_desc.txt)
          curl -F "_api_key=${{ secrets.PGYER_API_KEY }}" \
               -F "file=@artifacts/ReSourcer.ipa" \
               -F "buildUpdateDescription=${DESCRIPTION}" \
               https://www.pgyer.com/apiv2/app/upload

  # Create GitHub Release
  create-release:
    name: Create GitHub Release
    needs: [build-server, build-ios]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build-server.result == 'success' &&
      startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect commits since last tag
        id: commits
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | sed -n '2p' || true)
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s")
          fi
          echo "$COMMITS" > /tmp/commits.txt

      - name: Generate release notes with AI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          COMMITS=$(cat /tmp/commits.txt)

          PROMPT="Below is a list of git commits for this release of ReSourcer (a resource management server + web + iOS app):

          ${COMMITS}

          Categorize and rewrite these commits into a clear changelog. Important rules:
          - A single commit may contain MULTIPLE changes — split them into separate items
          - Each item should be a concise, user-friendly description (not just repeating the commit message)
          - Write in English
          - Capitalize the first letter of each description

          Output ONLY valid JSON in this exact format, with no markdown code fences or extra text:
          {\"features\": [\"desc1\", \"desc2\"], \"updates\": [\"desc1\", \"desc2\"], \"fixes\": [\"desc1\", \"desc2\"]}

          Categories:
          - features: New capabilities that didn't exist before
          - updates: Improvements, refactors, configuration or structural changes
          - fixes: Bug fixes

          If a category has no items, use an empty array []."

          RESPONSE=$(curl -sf https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$(jq -n --arg prompt "$PROMPT" '{
              "model": "gpt-4.1-mini",
              "messages": [{"role": "user", "content": $prompt}],
              "max_tokens": 1024,
              "temperature": 0.3
            }')")

          CHANGELOG=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          echo "$CHANGELOG" > /tmp/changelog.json

          BODY=""
          FEATURES=$(echo "$CHANGELOG" | jq -r '.features // [] | if length > 0 then "### Features\n" + (map("- " + .) | join("\n")) else empty end')
          UPDATES=$(echo "$CHANGELOG" | jq -r '.updates // [] | if length > 0 then "### Updates\n" + (map("- " + .) | join("\n")) else empty end')
          FIXES=$(echo "$CHANGELOG" | jq -r '.fixes // [] | if length > 0 then "### Fixes\n" + (map("- " + .) | join("\n")) else empty end')

          BODY="${FEATURES}"
          [ -n "$UPDATES" ] && BODY="${BODY}\n\n${UPDATES}"
          [ -n "$FIXES" ] && BODY="${BODY}\n\n${FIXES}"

          if [ -z "$BODY" ]; then
            BODY="### Changes\n$(cat /tmp/commits.txt)"
          fi

          echo -e "$BODY" > /tmp/release_body.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          body_path: /tmp/release_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

version: '3.8'

services:
  re-sourcer-web:
    image: ghcr.io/bwan3150/resourcer-web:latest
    container_name: re-sourcer-web
    restart: unless-stopped
    ports:
      - "5678:5678"
    # Docker Desktop (Mac/Win) 自动支持 host.docker.internal
    # Linux 需要添加以下配置:
    extra_hosts:
      - "host.docker.internal:host-gateway"

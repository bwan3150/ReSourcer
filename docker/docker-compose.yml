version: '3.8'

services:
  re-sourcer-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: re-sourcer-web
    restart: unless-stopped
    ports:
      - "80:80"
    # Docker Desktop (Mac/Win) 自动支持 host.docker.internal
    # Linux 需要添加以下配置:
    extra_hosts:
      - "host.docker.internal:host-gateway"
